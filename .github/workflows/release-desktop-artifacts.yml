name: Release Desktop Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    name: Prepare Release Version
    runs-on: ubuntu-22.04
    outputs:
      app_version: ${{ steps.meta.outputs.app_version }}
      tag_name: ${{ steps.meta.outputs.tag_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Determine release version
        id: meta
        shell: bash
        run: |
          APP_VERSION="$(python3 scripts/app_version.py source)"
          TAG_NAME="v${APP_VERSION}"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME:-}" != "${TAG_NAME}" ]]; then
            echo "Git tag ${GITHUB_REF_NAME} does not match pyproject version ${APP_VERSION}" >&2
            exit 1
          fi
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

  create-release:
    name: Create Release
    runs-on: ubuntu-22.04
    needs: prepare

    steps:
      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          generate_release_notes: true

  build-macos:
    name: macOS
    runs-on: macos-14
    needs: [prepare, create-release]
    env:
      SOLOKEYS_GUI_VERSION: ${{ needs.prepare.outputs.app_version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install libusb
        run: brew install libusb

      - name: Build app bundle and DMG
        run: |
          chmod +x build_macos.sh
          ./build_macos.sh

      - name: Upload macOS release artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          overwrite_files: true
          files: dist/SoloKeys-GUI-*.dmg

  build-windows:
    name: Windows
    runs-on: windows-2022
    needs: [prepare, create-release]
    env:
      SOLOKEYS_GUI_VERSION: ${{ needs.prepare.outputs.app_version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download libusb
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $zipPath = "$env:RUNNER_TEMP\libusb.zip"
          $extractDir = "$env:RUNNER_TEMP\libusb"
          Invoke-WebRequest `
            -Uri "https://github.com/libusb/libusb/releases/download/v1.0.27/libusb-1.0.27.7z" `
            -OutFile $zipPath
          7z x $zipPath "-o$extractDir" | Out-Null
          $dllPath = Get-ChildItem -Path $extractDir -Recurse -Filter "libusb-1.0.dll" |
            Where-Object { $_.FullName -match "MS64\\dll\\libusb-1\.0\.dll$" } |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $dllPath) {
            throw "Could not locate libusb-1.0.dll in extracted archive."
          }
          "LIBUSB_PATH=$dllPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows package
        shell: cmd
        run: build_windows.bat

      - name: Upload Windows release artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          overwrite_files: true
          files: dist/installer/SoloKeys-GUI-Setup-*.exe

  build-linux:
    name: Linux
    runs-on: ubuntu-22.04
    needs: [prepare, create-release]
    env:
      SOLOKEYS_GUI_VERSION: ${{ needs.prepare.outputs.app_version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev libusb-1.0-0-dev libpcsclite-dev libfuse2

      - name: Build Linux artifacts
        run: |
          chmod +x build_linux.sh
          chmod +x build_linux_deb.sh
          ./build_linux.sh
          ./build_linux_deb.sh

      - name: Upload Linux release artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          overwrite_files: true
          files: |
            dist/SoloKeys-GUI-*.AppImage
            dist/solokeys-gui_*.deb
